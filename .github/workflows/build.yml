name: build

# Build automatique macOS (Apple Silicon) + Windows (x64) à chaque tag "v*".
# Les binaires sont attachés à la Release du tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            script: build:mac
            out: portable/KTV-darwin-arm64/KTV.app
            asset: KTV-macos-arm64.zip
          - os: windows-latest
            script: build:win
            out: portable/KTV-win32-x64
            asset: KTV-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "${{ matrix.out }}" "${{ matrix.asset }}"

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "${{ matrix.out }}" -DestinationPath "${{ matrix.asset }}" -Force

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
